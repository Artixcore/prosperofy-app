# DigitalOcean App Platform spec — apply with: doctl apps create --spec app.yaml
# Or: Control Panel → Apps → Create → edit spec as YAML.
# Replace YOUR_GITHUB_USERNAME (and branch if needed) before deploy.

name: prosperofy-app
region: nyc

services:
  - name: web
    github:
      repo: https://github.com/Artixcore/prosperofy-app.git
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8080

    envs:
      - key: NODE_ENV
        value: production

      # Dockerfile builds: DO passes these as --build-arg so Next can inline NEXT_PUBLIC_*.
      - key: NEXT_PUBLIC_APP_URL
        value: https://app.prosperofy.com
        scope: RUN_AND_BUILD_TIME

      - key: NEXT_PUBLIC_LARAVEL_API_BASE_URL
        value: https://backend.prosperofy.com
        scope: RUN_AND_BUILD_TIME

      - key: APP_URL
        value: https://app.prosperofy.com

      - key: TRUSTED_HOSTS
        value: app.prosperofy.com
